env:
  MAINTAINER: "JJDev"
  PROJECT_NAME: "Arrow OS Revived"
  BUILD_HOSTNAME: "CirrusCI-JJDev"
  CIRRUS_CLONE_DEPTH: "1"

task:
  name: Arrow OS Revived Build (ginkgo)
  container:
    image: ubuntu:22.04
    cpu: 8
    memory: 32G

  setup_environment_script:
    - apt-get update -y
    - apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libc6-dev-i386 libncurses5 x11proto-core-dev libx11-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python3 python-is-python3 jq
    - mkdir -p ~/bin
    - curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
    - chmod a+x ~/bin/repo

  sync_script:
    - mkdir -p /tmp/rom
    - cd /tmp/rom
    - ~/bin/repo init -u https://github.com/ArrowOS/android_manifest.git -b arrow-13.1 --depth=1
    
    # Repositorios específicos para Xiaomi Redmi Note 8 (ginkgo)
    - git clone https://github.com/ArrowOS-Devices/android_device_xiaomi_ginkgo.git -b arrow-13.1 device/xiaomi/ginkgo
    - git clone https://github.com/ArrowOS-Devices/android_vendor_xiaomi_ginkgo.git -b arrow-13.1 vendor/xiaomi/ginkgo
    - git clone https://github.com/ArrowOS-Devices/android_kernel_xiaomi_ginkgo.git -b arrow-13.1 kernel/xiaomi/ginkgo
    
    - ~/bin/repo sync -c -j8 --no-clone-bundle --no-tags

  build_script:
    - cd /tmp/rom
    - source build/envsetup.sh
    - lunch arrow_ginkgo-userdebug
    - mka bacon -j$(nproc)

  upload_script:
    - cd /tmp/rom/out/target/product/ginkgo/
    - curl -sL https://git.io/file-transfer | sh
    - ./transfer wet Arrow-*.zip
