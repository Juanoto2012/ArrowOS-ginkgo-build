name: Arrow OS Revived Build (ginkgo)

on:
  workflow_dispatch: # Permite iniciar la compilación manualmente desde GitHub con un clic

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Liberar espacio en disco en el Runner
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h

      - name: Configurar entorno e instalar dependencias
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libc6-dev-i386 libncurses5 x11proto-core-dev libx11-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python3 python-is-python3 jq ccache
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo

      - name: Sincronizar fuentes de ArrowOS y Trees de ginkgo
        run: |
          mkdir -p /tmp/rom
          cd /tmp/rom
          ~/bin/repo init -u https://github.com/ArrowOS/android_manifest.git -b arrow-13.1 --depth=1
          git clone https://github.com/ArrowOS-Devices/android_device_xiaomi_ginkgo.git -b arrow-13.1 device/xiaomi/ginkgo
          git clone https://github.com/ArrowOS-Devices/android_vendor_xiaomi_ginkgo.git -b arrow-13.1 vendor/xiaomi/ginkgo
          git clone https://github.com/ArrowOS-Devices/android_kernel_xiaomi_ginkgo.git -b arrow-13.1 kernel/xiaomi/ginkgo
          ~/bin/repo sync -c -j8 --no-clone-bundle --no-tags

      - name: Configurar CCache (Optimizador de tiempo)
        run: |
          export USE_CCACHE=1
          export CCACHE_EXEC=/usr/bin/ccache
          export CCACHE_DIR=/tmp/ccache
          ccache -M 10G

      - name: Compilar Arrow OS Revived
        run: |
          cd /tmp/rom
          source build/envsetup.sh
          lunch arrow_ginkgo-userdebug
          mka bacon -j$(nproc)

      - name: Subir el archivo .zip de la ROM
        if: success()
        run: |
          cd /tmp/rom/out/target/product/ginkgo/
          curl -sL https://git.io/file-transfer | sh
          ./transfer wet Arrow-*.zip